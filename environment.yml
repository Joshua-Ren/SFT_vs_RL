name: llm
channels:
  - conda-forge
  - nvidia
dependencies:
  - python=3.10
  - pip
  - numpy
  - pandas
  - scipy
  - matplotlib
  - scikit-learn
  - tqdm
  - ipykernel
  - jupyter
  - pip:
      - --index-url https://download.pytorch.org/whl/cu118
      - torch==2.6.0
      - torchvision==0.21.0
      - torchaudio==2.6.0
      - --extra-index-url https://pypi.org/simple
      - transformers
      - datasets
      - accelerate
      - peft
      - trl
      - sentencepiece
      - huggingface_hub
      - safetensors
      - wandb
      - einops
      - jsonlines
      - pyyaml